<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API ŠŞČŔęŽ</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .result { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 4px; }
        button { padding: 10px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>API ŠŞČŔęŽ</h1>
    
    <button onclick="testProducts()">ŠŞČŔęŽ list_products</button>
    <button onclick="testOrders()">ŠŞČŔęŽ list_orders</button>
    <button onclick="testCustomers()">ŠŞČŔęŽ list_customers</button>
    <button onclick="testDashboard()">ŠŞČŔęŽ get_sales_dashboard</button>
    
    <div id="output"></div>
    
    <script>
    async function test(endpoint) {
        const url = '../api/operations.php?action=' + endpoint;
        const output = document.getElementById('output');
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            output.innerHTML += `
            <div class="result">
                <h3>${endpoint}</h3>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
            `;
        } catch (error) {
            output.innerHTML += `
            <div class="result" style="color: red;">
                <h3>${endpoint} - Úî»Ŕ¬Ą</h3>
                <p>${error.message}</p>
            </div>
            `;
        }
    }
    
    function testProducts() { test('list_products'); }
    function testOrders() { test('list_orders'); }
    function testCustomers() { test('list_customers_with_labels'); }
    function testDashboard() { test('get_sales_dashboard'); }
    </script>
</body>
</html>
